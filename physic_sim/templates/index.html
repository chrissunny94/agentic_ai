<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysSim — Agentic Physics Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="shell">

  <header>
    <div class="logo">
      <span>// AGENTIC</span>
      PhysSim
    </div>
    <div class="version">v0.1 · Gemini-powered</div>
  </header>

  <div class="input-section">
    <div class="input-wrap">
      <label class="input-label" for="promptInput">_ describe your simulation</label>
      <textarea id="promptInput" placeholder="e.g. Simulate a spring-mass system with damping coefficient 0.3..."></textarea>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
    <select id="modelSelect" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:0.1em;padding:8px 12px;cursor:pointer;outline:none;text-transform:uppercase" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:0.1em;padding:8px 12px;cursor:pointer;outline:none;text-transform:uppercase"></select>
    <div id="ollamaModelWrap" style="display:none">
      <label style="font-size:10px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px">_ local model</label>
      <select id="ollamaModelSelect" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--accent);font-family:var(--mono);font-size:11px;padding:8px 12px;cursor:pointer;outline:none"></select>
    </div>
    <button id="generateBtn" onclick="generateCode()">Run<br>Agent</button>
  </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">awaiting input</span>
  </div>

  <div class="viz-grid">
    <div class="panel" id="animPanel">
      <div class="panel-header">
        <span class="panel-title">Animation</span>
        <span class="panel-tag tag-anim">canvas</span>
      </div>
      <div class="panel-body" style="padding:12px">
        <canvas id="animationCanvas"></canvas>
        <div class="empty" id="animEmpty">
          <div class="empty-icon">◎</div>
          <span>no frames yet</span>
        </div>
      </div>
    </div>

    <div class="panel" id="plotPanel">
      <div class="panel-header">
        <span class="panel-title">Plot</span>
        <span class="panel-tag tag-plot">chart.js</span>
      </div>
      <div class="panel-body" style="padding:12px">
        <canvas id="plotCanvas" style="display:none"></canvas>
        <div class="empty" id="plotEmpty">
          <div class="empty-icon">∿</div>
          <span>no data yet</span>
        </div>
      </div>
    </div>
  </div>

  <div class="code-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Generated C++</span>
        <span class="panel-tag tag-code">main.cpp</span>
      </div>
      <div class="panel-body">
        <pre><code id="codeOutput">// agent output will appear here</code></pre>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Simulation Logs</span>
        <span class="panel-tag tag-log">stdout</span>
      </div>
      <div class="panel-body">
        <pre><code id="simOutput">// run a simulation to see logs</code></pre>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>

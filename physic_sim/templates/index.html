<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    /* ... existing styles ... */
    .viz-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
    canvas { background: #fff; border: 1px solid #ddd; border-radius: 8px; width: 100%; max-height: 400px; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
</style>

<body>
    <div class="container">
        <h2>Agentic Physics Simulator</h2>
        <textarea id="promptInput" placeholder="Try: 'Simulate a spring-mass system with damping'"></textarea>
        <button id="generateBtn" onclick="generateCode()">Generate & Compile</button>

        <div class="viz-container">
            <div>
                <h3>1. Animation</h3>
                <canvas id="animationCanvas"></canvas>
            </div>

            <div>
                <h3>2. Plots</h3>
                <canvas id="plotCanvas"></canvas>
            </div>

            <div class="grid">
                <div>
                    <h3>Generated C++</h3>
                    <pre><code id="codeOutput"></code></pre>
                </div>
                <div>
                    <h3>Simulation Logs</h3>
                    <pre><code id="simOutput"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let animationId = null;

        async function generateCode() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('generateBtn');
            if (!prompt) return;

            // UI Reset
            btn.disabled = true;
            btn.innerText = 'Agent Processing...';
            cancelAnimationFrame(animationId);

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                document.getElementById('codeOutput').innerText = data.code || "";
                
                if (response.ok) {
                    const rawOutput = data.output;
                    document.getElementById('simOutput').innerText = `[Attempts: ${data.attempts}]\n\n` + rawOutput;
                    parseAndRender(rawOutput);
                } else {
                    document.getElementById('simOutput').innerText = `[FAILED]\n${data.error}\n\n${data.last_log}`;
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Generate & Compile';
            }
        }

        function parseAndRender(text) {
            // 1. Parse Plots
            const plotMatch = text.match(/---PLOT_DATA---\n([\s\S]*?)\n---END_PLOT---/);
            if (plotMatch) {
                const plotData = JSON.parse(plotMatch[1]);
                renderChart(plotData);
            }

            // 2. Parse Animation
            const animMatch = text.match(/---ANIMATION_DATA---\n([\s\S]*?)\n---END_ANIMATION---/);
            if (animMatch) {
                const animData = JSON.parse(animMatch[1]);
                startAnimation(animData);
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('plotCanvas').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const datasets = Object.keys(data).map(label => ({
                label: label,
                data: data[label].map(p => ({ x: p[0], y: p[1] })),
                borderColor: '#' + Math.floor(Math.random()*16777215).toString(16),
                showLine: true
            }));

            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: { datasets },
                options: { responsive: true, scales: { x: { type: 'linear' } } }
            });
        }

        function startAnimation(frames) {
            const canvas = document.getElementById('animationCanvas');
            const ctx = canvas.getContext('2d');
            let frameIdx = 0;

            function draw() {
                const frame = frames[frameIdx];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw ground/anchor
                ctx.fillStyle = "#333";
                ctx.fillRect(0, 50, canvas.width, 2);

                // Draw Object (Dynamic based on sim)
                // We map sim coordinates to canvas coordinates
                const centerX = canvas.width / 2 + (frame.x * 50);
                const centerY = 150 + (frame.y * 50);

                ctx.beginPath();
                ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
                ctx.fillStyle = "#007bff";
                ctx.fill();

                frameIdx = (frameIdx + 1) % frames.length;
                animationId = requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
